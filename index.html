<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="h1">Pomodoro</h1>
    <div id="pomodoro" class="divBase">
        <div id="timer" class="posNumber">25:00</div>
        <div class="posTxt">
            <div class="controles">
                <button id="start" class="buttons">Iniciar</button>
                <button id="pause" class="buttons">Pausar</button>
                <button id="reset" class="buttons">Reiniciar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
